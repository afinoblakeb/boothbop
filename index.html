<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#f6e7cf" />
    <meta
      name="description"
      content="Turn your phone into a selfie photo booth. Four photos back to back, then a strip, GIF, or video."
    />

    <!-- Installable web app (Add to Home Screen). The web app manifest is
         injected at build time by vite-plugin-pwa. -->
    <link rel="icon" type="image/png" href="favicon-32.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="BoothBop" />

    <!-- Social preview -->
    <meta property="og:title" content="BoothBop" />
    <meta
      property="og:description"
      content="Turn your phone into a selfie photo booth."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>BoothBop 📸</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #f6e7cf;
      }

      body {
        color: #111111;
      }

      #root:empty::before {
        content: "BOOTHBOP";
        position: fixed;
        top: max(56px, env(safe-area-inset-top));
        left: 36px;
        color: #111111;
        font:
          700 34px/1 system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
